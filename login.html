<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - ESTPL Careers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: rgb(218, 214, 214);
    }
    .form-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .form-title {
      font-size: 24px;
      font-weight: 600;
    }
    .form-toggle {
      font-size: 14px;
      color: #007bff;
      cursor: pointer;
    }
    .form-toggle:hover {
      text-decoration: underline;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #007bff;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="logo text-center text-uppercase">Absys Careers</div>
    <div id="loginForm">
      <h4 class="form-title mb-3">Login</h4>
      <form>
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="loginEmail" required>
        </div>
        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" required>
        </div>
        <div class="mb-3 text-end">
          <span class="form-toggle" onclick="toggleForm('forgotPasswordForm')">Forgot Password?</span>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
        <div class="text-center mt-3">
          <span>Don't have an account? <span class="form-toggle" onclick="toggleForm('signupForm')">Sign Up</span></span>
        </div>
      </form>
    </div>

    <div id="signupForm" style="display:none;">
      <h4 class="form-title mb-3">Sign Up</h4>
      <form>
        <div class="mb-3">
          <label for="signupName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="signupName" required>
        </div>
        <div class="mb-3">
          <label for="signupEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="signupEmail" required>
        </div>
        <div class="mb-3">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="signupPassword" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
        <div class="text-center mt-3">
          <span>Already have an account? <span class="form-toggle" onclick="toggleForm('loginForm')">Login</span></span>
        </div>
      </form>
    </div>

    <div id="forgotPasswordForm" style="display:none;">
      <h4 class="form-title mb-3">Forgot Password</h4>
      <form>
        <div class="mb-3">
          <label for="forgotEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="forgotEmail" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
        <div class="text-center mt-3">
          <span>Back to <span class="form-toggle" onclick="toggleForm('loginForm')">Login</span></span>
        </div>
      </form>
    </div>
  </div>

  <script>
    function toggleForm(formId) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('forgotPasswordForm').style.display = 'none';
      document.getElementById(formId).style.display = 'block';
    }
  </script>

</body>
</html>
